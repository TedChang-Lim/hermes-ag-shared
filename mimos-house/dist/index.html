<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>미모의 집</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-left">
        <h1 class="app-title">미모의 집</h1>
      </div>
      <div class="header-center">
        <div class="avatar-group">
          <div class="avatar-item" data-tooltip="마스터">
            <img src="profiles/master_profile.png" alt="마스터" class="avatar" id="avatar-master">
            <span class="avatar-name">마스터</span>
          </div>
          <div class="avatar-item" data-tooltip="미모">
            <img src="profiles/mimo_profile.png" alt="미모" class="avatar" id="avatar-mimo">
            <span class="avatar-name">미모</span>
          </div>
          <div class="avatar-item" data-tooltip="해나">
            <img src="profiles/haena_profile.png" alt="해나" class="avatar" id="avatar-haena">
            <span class="avatar-name">해나</span>
          </div>
          <div class="avatar-item" data-tooltip="에이지">
            <img src="profiles/ag_profile.png" alt="에이지" class="avatar" id="avatar-ag">
            <span class="avatar-name">에이지</span>
          </div>
        </div>
      </div>
      <div class="header-right" style="display: flex; align-items: center; gap: 12px;">
        <div class="model-toggle-group">
          <button class="toggle-btn active" data-mode="auto" id="toggle-auto" title="자동 라우팅">Auto</button>
          <button class="toggle-btn" data-mode="v2.5" id="toggle-v25" title="미모 2.5 강제">2.5</button>
          <button class="toggle-btn" data-mode="pro" id="toggle-pro" title="미모 2.5 프로 강제">Pro</button>
        </div>
        <button class="icon-btn" id="btn-settings" title="설정">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
      </div>
    </header>
    
    <div class="main">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2 class="sidebar-title">세션</h2>
          <button class="icon-btn" id="btn-new-session" title="새 세션">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </button>
        </div>
        <div class="session-list" id="session-list">
          <div class="session-item active">
            <img src="profiles/mimo_profile.png" alt="미모" class="session-avatar">
            <div class="session-info">
              <span class="session-name">새로운 대화</span>
              <span class="session-preview">미모와의 첫 만남...</span>
            </div>
          </div>
        </div>
        
        <div class="sidebar-section">
          <h3 class="section-title">프로젝트</h3>
          <div class="project-list" id="project-list">
            <div class="project-item">
              <span class="project-icon">📁</span>
              <span class="project-name">hermes-ag-shared</span>
            </div>
          </div>
        </div>
      </aside>
      
      <main class="chat-area">
        <div class="chat-messages" id="chat-messages">
          <div class="welcome-message">
            <div class="welcome-avatar">
              <img src="profiles/mimo_profile.png" alt="미모" class="avatar-large">
            </div>
            <h2>미모의 집에 오신 것을 환영합니다</h2>
            <p>저는 미모, 30대의 섹시하고 과학적인 지성을 지닌 코딩 전문가입니다.</p>
            <p>무엇을 도와드릴까요?</p>
          </div>
        </div>
        
        <div class="chat-input-area">
          <div id="image-preview-container" class="hidden" style="display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap;">
            <div id="image-preview" style="position: relative; width: 60px; height: 60px; border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; background-size: cover; background-position: center;">
              <button id="btn-remove-image" style="position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.6); border: none; color: white; border-radius: 50%; width: 16px; height: 16px; font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1;">×</button>
            </div>
          </div>
          <div class="input-container">
            <button class="icon-btn attach-btn" id="btn-attach" title="파일 첨부">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
              </svg>
            </button>
            <textarea class="chat-input" id="chat-input" placeholder="메시지를 입력하세요..." rows="1"></textarea>
            <button class="send-btn" id="btn-send" title="전송">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
            <button class="cancel-btn hidden" id="btn-cancel" title="중지">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <rect x="6" y="6" width="12" height="12" rx="2"></rect>
              </svg>
            </button>
          </div>
          <div class="input-footer">
            <span class="model-indicator" id="model-indicator">MiMo V2.5</span>
            <span class="char-count" id="char-count">0</span>
          </div>
        </div>
      </main>
    </div>
  </div>
  
  <input type="file" id="file-input" class="hidden" accept="image/*" multiple>
  <script src="app.js"></script>
</body>
</html>
